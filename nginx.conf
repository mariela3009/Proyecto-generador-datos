server {
    listen 80;
    server_name tu-dominio.com; # TODO: Cambiar por el dominio real

    # Frontend (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend (FastAPI)
    location /api/ {
        # Reescribimos la ruta para quitar /api si el backend no lo espera, 
        # o lo pasamos directo si FastAPI usa routers con el prefijo correcto.
        # En nuestro caso, los endpoints de FastAPI no tienen /api en su prefix, 
        # así que es mejor pasarlos sin el /api.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
